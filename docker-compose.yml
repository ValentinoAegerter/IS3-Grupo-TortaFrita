services:
  app:
    build: .
    container_name: tortafrita-app
    depends_on:
      - postgres

  postgres:
    image: postgres:17
    container_name: tortafrita-db
    environment:
      POSTGRES_DB: eventos
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: