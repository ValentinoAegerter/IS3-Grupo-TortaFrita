
services:
  # Servicio de la Base de Datos
  db:
    image: postgres:15-alpine
    container_name: eventos_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: eventos_academicos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Servicio de la Aplicación
  app:
    build: .
    container_name: eventos_app
    ports:
      - "8080:8080"
    environment:
      
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/eventos_academicos
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=adminpassword
    depends_on:
      - db


volumes:
  postgres_data: